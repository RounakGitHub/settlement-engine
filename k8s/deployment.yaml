apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement-engine-api
  labels:
    app: settlement-engine
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: settlement-engine
      component: api
  template:
    metadata:
      labels:
        app: settlement-engine
        component: api
    spec:
      containers:
        - name: api
          image: settlement-engine:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: settlement-engine-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
